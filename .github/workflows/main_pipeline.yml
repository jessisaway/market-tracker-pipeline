name: Market Tracker Pipeline

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: pip install requests pandas

      - name: Executar Extração de Dados
        run: python main.py

      - name: Salvar e dar Push nos dados novos
        run: |
          git config --global user.name "jessisaway"
          git config --global user.email "jessica08cristina@gmail.com"
          git add market_price.csv market_status.json
          git commit -m "auto: atualização horária de dados [skip ci]" || exit 0
          git push